<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Airport Field Input Terminal</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f7f6; padding: 20px; text-align: center; }
        .card { background: white; padding: 20px; border-radius: 8px; max-width: 400px; margin: 20px auto; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        select, input, button { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; border-radius: 4px; border: 1px solid #ccc; font-size: 16px; }
        button { background: #007bff; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>
    <h2>Airport Management System</h2>
    <p>Field Staff Transmission Terminal</p>
    <div class="card">
        <label>Select Metric to Update:</label>
        <select id="metricSelect">
            <option value="baggageWait">Baggage Claim Wait Time (Mins)</option>
            <option value="securityQueue">Security Check Queue (Mins)</option>
            <option value="activeCheckin">Active Check-in Counters</option>
            <option value="delayedFlights">Delayed Flights Count</option>
        </select>
        <label>Enter New Value:</label>
        <input type="number" id="metricValue" placeholder="e.g. 25">
        <button onclick="sendUpdate()">Transmit Live Update</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/socket.io-client@4.7.5/dist/socket.io.min.js"></script>
    <script>
        const socket = io(window.location.origin);

        function sendUpdate() {
            const metric = document.getElementById('metricSelect').value;
            const value = document.getElementById('metricValue').value;

            if(!value) { alert('Please enter a value first'); return; }

            fetch('/api/update-metric', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ metric, value })
            })
            .then(res => res.json())
            .then(data => { 
                alert('Metric transmitted successfully!'); 
                document.getElementById('metricValue').value = ''; 
            })
            .catch(err => alert('Transmission failed.'));
        }
    </script>
</body>
</html>
