<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AMS - Field Input Terminal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #121824; color: #f3f4f6; padding: 40px; display: flex; justify-content: center; }
        .form-container { background: #1e2640; padding: 30px; border-radius: 8px; border: 1px solid #2e3a5f; width: 100%; max-width: 400px; }
        h2 { margin-bottom: 20px; font-size: 1.25rem; }
        label { display: block; margin-bottom: 8px; font-size: 0.85rem; color: #9ca3af; text-transform: uppercase; }
        select, input { width: 100%; padding: 12px; background: #0f1420; border: 1px solid #2e3a5f; color: #fff; border-radius: 6px; margin-bottom: 20px; box-sizing: border-box; font-size: 1rem; }
        button { width: 100%; padding: 14px; background: #10b981; border: none; color: white; font-weight: 600; border-radius: 6px; cursor: pointer; font-size: 1rem; }
        button:hover { background: #059669; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Field Data Entry Terminal</h2>
    
    <label for="metricSelect">Select Operational Area</label>
    <select id="metricSelect">
        <option value="securityQueue">Security Queue Time (mins)</option>
        <option value="checkInQueue">Check-in Queue Time (mins)</option>
        <option value="firstBag">First Bag Delivery (mins)</option>
        <option value="lastBag">Last Bag Delivery (mins)</option>
    </select>

    <label for="metricValue">Current Value</label>
    <input type="number" id="metricValue" placeholder="e.g. 15" min="0">

    <button onclick="submitData()">Transmit to Control Room</button>
</div>

<script>
    async function submitData() {
        const metric = document.getElementById('metricSelect').value;
        const value = document.getElementById('metricValue').value;

        if(!value) return alert('Please enter a valid metric value');

        // Send data to our Node.js Server API
        const response = await fetch('/api/update-metric', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ metric, value: parseFloat(value) })
        });

        if(response.ok) {
            alert('Telemetry successfully transmitted.');
            document.getElementById('metricValue').value = '';
        } else {
            alert('Transmission error.');
        }
    }
</script>
</body>
</html>
