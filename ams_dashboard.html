<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Airport Operations Control Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; background: #1e293b; color: white; padding: 20px; }
        h1 { text-align: center; color: #38bdf8; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-top: 40px; }
        .metric-box { background: #0f172a; padding: 30px; border-radius: 12px; text-align: center; border: 2px solid #334155; }
        .metric-box h3 { margin: 0; color: #94a3b8; font-size: 14px; text-transform: uppercase; }
        .number { font-size: 48px; font-weight: bold; color: #f43f5e; margin: 10px 0; transition: all 0.3s ease; }
    </style>
</head>
<body>
    <h1>🛫 Airport Operations Control Dashboard (LIVE)</h1>
    <div class="grid">
        <div class="metric-box">
            <h3>Baggage Wait Time</h3>
            <div class="number" id="baggageWait">--</div>
            <p>Minutes</p>
        </div>
        <div class="metric-box">
            <h3>Security Queue</h3>
            <div class="number" id="securityQueue">--</div>
            <p>Minutes</p>
        </div>
        <div class="metric-box">
            <h3>Active Check-in</h3>
            <div class="number" id="activeCheckin">--</div>
            <p>Counters Open</p>
        </div>
        <div class="metric-box">
            <h3>Delayed Flights</h3>
            <div class="number" id="delayedFlights">--</div>
            <p>Aircraft</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/socket.io-client@4.7.5/dist/socket.io.min.js"></script>
    <script>
        const socket = io(window.location.origin); 

        socket.on('connect', () => {
            console.log('Connected to live socket network server!');
        });

        socket.on('metric-updated', (data) => {
            console.log('Received real-time sync data:', data);
            const element = document.getElementById(data.metric);
            if(element) {
                element.innerText = data.value;
                element.style.color = '#34d399';
                setTimeout(() => { element.style.color = '#f43f5e'; }, 1000);
            }
        });
    </script>
</body>
</html>
